name: Admin Daily Report

on:
  # GitHub cron is UTC. 00:00 UTC is 09:00 KST.
  # Scheduled workflows are best-effort and can be delayed by GitHub runner load.
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Send admin daily report
        env:
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
          BACKEND_ADMIN_USERNAME: ${{ secrets.BACKEND_ADMIN_USERNAME }}
          BACKEND_ADMIN_PASSWORD: ${{ secrets.BACKEND_ADMIN_PASSWORD }}
          REPORT_MAIL_FROM: ${{ secrets.REPORT_MAIL_FROM }}
          REPORT_MAIL_TO: ${{ secrets.REPORT_MAIL_TO }}
          REPORT_MAIL_PASSWORD: ${{ secrets.REPORT_MAIL_PASSWORD }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          ADMIN_WEB_URL: ${{ secrets.ADMIN_WEB_URL }}
        run: python scripts/send_admin_daily_report.py
