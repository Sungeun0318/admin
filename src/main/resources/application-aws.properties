server.port=${SERVER_PORT:5000}

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

api.external-server.url=${API_EXTERNAL_SERVER_URL}
backend.admin.username=${BACKEND_ADMIN_USERNAME}
backend.admin.password=${BACKEND_ADMIN_PASSWORD}
